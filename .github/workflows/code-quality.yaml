name: Code Quality Checks

on:
  # Allow this workflow to be called from other workflows.
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  code-quality-checks:
    name: Code Quality Checks
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract `uv` Version from Dockerfile
        id: uv-version
        run: |
          version=$(sed -n 's|.*ghcr.io/astral-sh/uv:\([0-9]*\.[0-9]*\).*|\1|p' Dockerfile)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install `uv` ${{ steps.uv-version.outputs.version }}
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv-version.outputs.version }}

      - name: Print `uv` Version
        run: uv --version

      - name: Run Unit Tests
        run: |-
          uv run --group test pytest --verbose

      - name: Run Linting
        run: |-
          uv run --group lint ruff check

      - name: Run Formatting Check
        run: |-
          uv run --group lint ruff format --check

      - name: Run Type Checking
        run: |-
          uv run --group lint ty check
