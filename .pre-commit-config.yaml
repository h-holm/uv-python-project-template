ci:
  skip: [uv-ty]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-docstring-first
      - id: debug-statements
      - id: check-ast
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=auto'] # Replace "auto" with "lf" to enforce Linux/Mac line endings or "crlf" for Windows
        priority: 0

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        priority: 0

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        entry: markdownlint-cli2 --config pyproject.toml --configPointer /tool/markdownlint-cli2
        priority: 0

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        priority: 0

  # The built-in `check-json` hook does not support JSON5 files (~= JSON with comments and trailing commas). To lint
  # JSON5 files, use the `check-json5` hook instead.
  - repo: https://gitlab.com/bmares/check-json5
    rev: v1.0.1
    hooks:
      - id: check-json5
        priority: 0

  # The `actionlint` hook verifies correct syntax in GitHub Actions workflows.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        language: golang # Ensures dependency update tools such as Renovate updates the `additional_dependencies`.
        additional_dependencies:
          # `actionlint` offers a feature which extracts shell scripts in GitHub Actions `run:` steps and checks them
          # with `shellcheck`. This is arguably the most useful feature of `actionlint`, but the feature only works if
          # `shellcheck` is installed.
          - 'github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1'
        priority: 0

  # Ensure the `uv.lock` file is in sync with the `pyproject.toml` config.
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.4
    hooks:
      - id: uv-lock
        priority: 0

  # Ensure that `ruff` and `ty` versions here in the `prek` hooks align with the `uv.lock` file.
  - repo: https://github.com/tsvikas/sync-with-uv
    rev: v0.5.0
    hooks:
      - id: sync-with-uv
        priority: 1

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        types_or: [python, pyi, jupyter]
        args: [--fix]
        priority: 1
      - id: ruff-format
        types_or: [python, pyi, jupyter]
        priority: 1

  # No official `ty` hook exists. Until one is created, use `uv` and the "lint" dependency group and run `ty` in
  #'local' mode. This also ensures that settings and versions between the `pre-commit` hooks and the `pyproject.toml`
  # are aligned.
  - repo: local
    hooks:
      - id: uv-ty
        name: uv ty
        entry: uv run --group lint ty check
        language: system
        types_or: [python, pyi, jupyter]
        verbose: true
        priority: 1
